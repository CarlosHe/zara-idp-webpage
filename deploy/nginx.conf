# Sprint 11 / L-1105: canonical Nginx front-door config for the Zara
# IDP webapp. Mirror of scripts/security-headers.ts so CDN operators
# have a single file to copy. Headers must stay in sync with
# .claude/docs/front/15-CONTENT-SECURITY.md.
#
# This file is checked in as a reference; the actual deploy target
# (cluster ingress, CDN, or sidecar) imports the same headers via
# Helm values / Terraform variables.

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ----- static assets -----
    # Hashed bundles (vendor-*, main-*, *.css) get long-cache; the entry
    # HTML never gets cached so deploys take effect immediately.
    location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|gif|webp|avif)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ----- security headers -----
    # CSP: same set as scripts/security-headers.ts buildCsp(). Connect
    # extras for Sentry / analytics get injected via Nginx variables at
    # render time (see helm chart). Strict prod default below.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'; worker-src 'self' blob:; manifest-src 'self'" always;
    add_header Cross-Origin-Opener-Policy   "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options       "nosniff" always;
    add_header X-Frame-Options              "DENY" always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload" always;

    # ----- API proxy -----
    # Requests to /api/* hit the control-plane gateway. The proxy keeps
    # the request same-origin so connect-src 'self' covers it.
    location /api/ {
        proxy_pass         http://zara-control-plane:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Correlation-ID  $request_id;
    }

    # health probe for liveness
    location = /healthz { access_log off; return 200 'ok'; default_type text/plain; }
}
